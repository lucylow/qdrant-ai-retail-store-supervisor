version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant-data:/qdrant/storage

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
    volumes:
      - ./backend:/usr/src/app
    depends_on:
      - qdrant
      - redis

  web:
    build: ./web
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  qdrant-data: {}
