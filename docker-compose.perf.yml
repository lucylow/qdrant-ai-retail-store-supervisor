# Performance stack: GPU + Redis + Prometheus + Grafana (1000 QPS target)
version: "3.9"

services:
  redis-cluster:
    image: redis:7-alpine
    ports:
      - "6379:6379"
      - "16379:16379"
    command: redis-server --appendonly yes

  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant-perf-data:/qdrant/storage

  app-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis-cluster:6379
      - LOG_LEVEL=INFO
    volumes:
      - ./:/app
    depends_on:
      - qdrant
      - redis-cluster
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  qdrant-perf-data: {}
  prometheus-data: {}
  grafana-data: {}
