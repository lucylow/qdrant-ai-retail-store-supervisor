# Geospatial mapping, navigation & logistics (Migros retail stores)
# Run: docker compose -f docker-compose.geomap.yml up -d
# Then: apply migrations/001_create_geodb.sql and run scripts/seed_migros_stores.py
version: "3.8"

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: livemap
    ports:
      - "5432:5432"
    volumes:
      - geomap_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d livemap"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

volumes:
  geomap_db_data:
  qdrant_storage:
