version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant-data:/qdrant/storage

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  app:
    build: ./backend
    command: bash -c "python scripts/run_supervisor.py"
    environment:
      - LOG_LEVEL=DEBUG
    volumes:
      - ./backend:/usr/src/app
    depends_on:
      - qdrant
      - redis

volumes:
  qdrant-data: {}