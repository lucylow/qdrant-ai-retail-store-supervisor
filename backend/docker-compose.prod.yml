# Production deployment - Judge-ready
version: "3.8"
services:
  app:
    build: .
    image: store-supervisor:prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - LOG_LEVEL=INFO
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  qdrant_data: {}
